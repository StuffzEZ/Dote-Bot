services:
  dote-bot:
    build: .
    container_name: dote-bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_IDS: ${DISCORD_GUILD_IDS:-}
      WHISPER_URL: http://localhost:9000
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct:free}
      SILENCE_FLUSH_MS: ${SILENCE_FLUSH_MS:-1200}
      MIN_UTTERANCE_MS: ${MIN_UTTERANCE_MS:-400}
      AUTO_LEAVE_EMPTY_MS: ${AUTO_LEAVE_EMPTY_MS:-10000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "9000:9000" # Whisper ASR (optional, for debugging)
    volumes:
      - dote-data:/app/data

volumes:
  dote-data:
